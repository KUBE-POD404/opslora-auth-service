name: Docker Build

on:
  workflow_call:
    outputs:
      image_tag:
        value: ${{ jobs.build.outputs.image_tag }}
      failure_stage:
        value: ${{ jobs.build.outputs.failure_stage }}
      report_url:
        value: ${{ jobs.build.outputs.report_url }}

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      failure_stage: ${{ steps.failure.outputs.stage }}
      report_url: ${{ steps.report.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          TAG=${GITHUB_SHA::7}
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - id: report
        run: |
          echo "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$OWNER/$REPO" >> $GITHUB_OUTPUT

      - name: Build image
        run: docker build -t ${{ steps.image.outputs.image }}:${{ steps.meta.outputs.tag }} .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh

      - name: Scan image
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 1 ${{ steps.image.outputs.image }}:${{ steps.meta.outputs.tag }}

      - name: Push image
        run: docker push ${{ steps.image.outputs.image }}:${{ steps.meta.outputs.tag }}

      - id: failure
        if: failure()
        run: echo "stage=failed" >> $GITHUB_OUTPUT