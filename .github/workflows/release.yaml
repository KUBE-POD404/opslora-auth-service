name: Release Pipeline

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - id: version
        run: |
          TAG='${{ github.event.release.tag_name }}'
          REGEX='^v[0-9]+\.[0-9]+\.[0-9]+(-((alpha|beta|rc)\.[0-9]+))?$'

          if [[ ! "$TAG" =~ $REGEX ]]; then
            echo "Invalid tag format"
            exit 1
          fi

          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - id: sha
        run: |
          SHA=$(git rev-list -n 1 ${{ github.event.release.tag_name }})
          SHORT_SHA="${SHA::7}"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Promote image
        run: |
          docker pull ${{ steps.image.outputs.image }}:${{ steps.sha.outputs.sha }}

          docker tag \
            ${{ steps.image.outputs.image }}:${{ steps.sha.outputs.sha }} \
            ${{ steps.image.outputs.image }}:${{ steps.version.outputs.version }}

          docker push ${{ steps.image.outputs.image }}:${{ steps.version.outputs.version }}