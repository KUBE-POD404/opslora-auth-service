name: auth-sast-sca-pipeline

on:
  pull_request:
    types: [opened, synchroinze]


jobs:
  sonar-scan:
    name: Sonar Code Quality Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2

        with: 
          args: >
            -Dsonar.projectKey=opslora-auth-service
            -Dsonar.sources=.
        
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} 


  quality-gate:
    name: Custom Quality Gate Check
    runs-on: ubuntu-latest
    needs: sonar-scan


    steps: 
      - name: Check Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}